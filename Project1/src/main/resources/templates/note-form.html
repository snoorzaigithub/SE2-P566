<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Note Form</title>
    <link rel="stylesheet" th:href="@{/styles.css}">
</head>
<body>
<div class="page">
    <div class="card form-card">
        <h1 th:text="${note.id == null} ? 'Create a Note' : 'Edit Note'">Note Form</h1>

        <form th:action="${note.id == null} ? @{/notes} : @{'/notes/update/' + ${note.id}}" method="post">
            <label>Title</label>
            <input type="text" name="title" th:value="${note.title}" required>

            <label>Category</label>
            <input type="text" name="category" th:value="${note.category}" placeholder="Work, Study, Personal...">

            <label>Content</label>
            <textarea name="content" rows="8" th:text="${note.content}" placeholder="Write your note here..."></textarea>

            <label>Reminder Date & Time</label>
            <input type="datetime-local"
                   name="reminderTime"
                   th:value="${note.reminderTime != null ? #temporals.format(note.reminderTime, 'yyyy-MM-dd''T''HH:mm') : ''}">

            <label class="checkbox-row">
                <input type="checkbox" name="pinned" th:checked="${note.pinned}">
                Pin this note
            </label>

            <div class="form-actions">
                <button type="submit" class="btn primary">Save</button>
                <a class="btn secondary" th:href="@{/notes}">Cancel</a>
            </div>
        </form>
    </div>
</div>

<div th:replace="~{fragments/reminder-script :: fragment}"></div>
 </body>
</html>
