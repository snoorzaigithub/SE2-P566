<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Note & Reminder</title>
    <link rel="stylesheet" th:href="@{/styles.css}">
</head>
<body>
<div class="page">
    <div class="topbar">
        <div>
            <h1>My Note and Reminder</h1>
        </div>

        <div class="topbar-actions">
            <a class="btn primary" th:href="@{/notes/new}">+ Create Note</a>
            <a class="btn secondary" th:href="@{/}">Home</a>
        </div>
    </div>

    <div class="card search-card">
        <form th:action="@{/notes}" method="get" class="search-form">
            <input type="text" name="keyword" th:value="${keyword}" placeholder="Search by title or content">
            <button type="submit" class="btn primary">Search</button>
        </form>
    </div>

    <div th:if="${#lists.isEmpty(notes)}" class="card empty-card">
        <p>No notes found. Create your first note.</p>
    </div>

    <div class="notes-grid">
        <div class="note-card" th:each="note : ${notes}">
            <div class="note-header">
                <h3 th:text="${note.title}">Title</h3>
                <span class="badge" th:if="${note.pinned}">Pinned</span>
            </div>

            <p class="category" th:if="${note.category != null and !note.category.isEmpty()}">
                Category: <span th:text="${note.category}"></span>
            </p>

            <p class="note-content" th:text="${note.content}">Content</p>

            <div class="meta">
                <p>
                    <strong>Reminder:</strong>
                    <span th:text="${note.reminderTime != null ? #temporals.format(note.reminderTime, 'MMM d, yyyy h:mm a') : 'No reminder set'}"></span>
                </p>

                <p>
                    <strong>Updated:</strong>
                    <span th:text="${note.updatedAt != null ? #temporals.format(note.updatedAt, 'MMM d, yyyy h:mm a') : ''}"></span>
                </p>
            </div>

            <div class="note-actions">
                <a class="btn secondary" th:href="@{'/notes/edit/' + ${note.id}}">Edit</a>

                <form th:action="@{'/notes/delete/' + ${note.id}}" method="post"
                      onsubmit="return confirm('Are you sure you want to delete this note?');">
                    <button type="submit" class="btn danger">Delete</button>
                </form>
            </div>
        </div>
    </div>
</div>

<div th:replace="~{fragments/reminder-script :: fragment}"></div>
</body>
</html>
